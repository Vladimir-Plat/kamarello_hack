services:
  backend:
    build: ./backend
    ports:
      - "8765:8000"
    volumes:
      - ./backend/storage:/app/storage
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8765}
    ports:
      - "5174:80"
    depends_on:
      - backend
